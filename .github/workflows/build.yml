name: Build Executables

on:
  push:
    tags:
      - 'v*' # Trigger on version tags e.g., v1.0.0
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: SortingApp-Linux
            asset_name: SortingApp-Linux.zip
          - os: windows-latest
            artifact_name: SortingApp.exe
            asset_name: SortingApp-Windows.zip
          - os: macos-latest
            artifact_name: SortingApp
            asset_name: SortingApp-MacOS.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --name SortingApp --onefile main.py

      - name: Prepare Release Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir release_pkg
          cp dist/SortingApp release_pkg/${{ matrix.artifact_name }}
          cp config.json release_pkg/
          cd release_pkg && zip -r ../${{ matrix.asset_name }} .

      - name: Prepare Release Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release_pkg
          copy dist\SortingApp.exe release_pkg\
          copy config.json release_pkg\
          Compress-Archive -Path release_pkg\* -DestinationPath ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
